<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066FF"/>
      <stop offset="100%" style="stop-color:#003399"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6A00"/>
      <stop offset="100%" style="stop-color:#FF8800"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="#FF6A00" stroke-width="2"/>
  
  <!-- Shield shape -->
  <path d="M32 8 L52 16 L52 32 C52 44 43 52 32 56 C21 52 12 44 12 32 L12 16 Z" 
        fill="#0D0D0D" 
        stroke="#F2B705" 
        stroke-width="1.5"
        filter="url(#glow)"/>
  
  <!-- K letter -->
  <text x="32" y="42" 
        font-family="Arial Black, sans-serif" 
        font-size="28" 
        font-weight="900" 
        fill="url(#accent)" 
        text-anchor="middle"
        filter="url(#glow)">K</text>
  
  <!-- Crossed swords effect (simplified) -->
  <line x1="18" y1="22" x2="28" y2="32" stroke="#F2B705" stroke-width="2" stroke-linecap="round"/>
  <line x1="46" y1="22" x2="36" y2="32" stroke="#F2B705" stroke-width="2" stroke-linecap="round"/>
</svg>
